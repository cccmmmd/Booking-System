openapi: 3.0.3
info:
  title: 連鎖按摩店線上多人預約系統 API
  version: 2.6.0
  description: '連鎖按摩店線上多人預約系統前後台 API 規格。


    **認證說明：**

    - 前台（`/public/*`）所有端點不需要認證

    - 後台（`/admin/*`）所有端點需帶 Bearer Token（由既有後台系統簽發）


    **角色權限：**

    - 門市人員（Store Staff）：僅可存取 `/admin/dashboard`

    - 營運人員（Operations Staff）：可存取所有後台端點

    '
servers:
- url: /api/v1
  description: API 基礎路徑
tags:
- name: 前台 - 分店與服務
  description: 分店列表、服務項目等查詢
- name: 前台 - 時段查詢
  description: 可預約時段查詢
- name: 前台 - 預約
  description: 建立預約
- name: 前台 - 取消預約
  description: 驗證預約身份、執行取消
- name: 後台 - 預約管理
  description: 預約列表、詳情、狀態編輯、備註（僅營運人員）
- name: 後台 - 手動建立預約
  description: 後台三步驟手動建立預約（僅營運人員）
- name: 後台 - 看板
  description: 預約營運看板（門市人員與營運人員皆可）
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 既有後台系統簽發的認證 Token
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: 欄位格式驗證失敗
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 10
          description: 固定每頁 10 筆
        total_pages:
          type: integer
          example: 3
        total_count:
          type: integer
          example: 24
    Branch:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 台北信義店
        phone:
          type: string
          example: 02-1234-5678
    Slot:
      type: object
      properties:
        slot_start:
          type: string
          format: time
          example: '13:00'
        slot_end:
          type: string
          format: time
          example: '14:30'
    Service:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 全身指壓按摩
        duration_min:
          type: integer
          example: 60
        price:
          type: string
          example: '1200.00'
    GuestInput:
      type: object
      required:
      - guest_order
      - service_id
      properties:
        guest_order:
          type: integer
          minimum: 1
          maximum: 4
          example: 1
          description: 成員順序，1 為主要預約人
        service_id:
          type: integer
          example: 1
    GuestSummary:
      type: object
      properties:
        guest_order:
          type: integer
          example: 1
        is_primary:
          type: boolean
          example: true
          description: true 表示主要預約人（guest_order = 1）
        service_name:
          type: string
          example: 全身指壓按摩
        duration_min:
          type: integer
          example: 60
        price:
          type: string
          example: '1200.00'
    SlotUnavailableError:
      type: object
      description: |
        時段資源衝突錯誤，用於 POST /public/bookings 與 POST /admin/bookings 的 409 回應。
        前端應依 `all_slots_unavailable` 決定導頁行為：
        - `false`：僅所選時段不可用 → 清除 Step 2 選擇，停留 Step 2 讓客人重選時段。
        - `true`：當日該分店所有時段均無法滿足人數 → 清除 Step 1 與 Step 2 所有選擇，跳回 Step 1。
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              enum:
              - SLOT_UNAVAILABLE
              - THERAPIST_UNAVAILABLE
              example: SLOT_UNAVAILABLE
            message:
              type: string
              example: 所選時段床位已不足，請重新選擇時段
            all_slots_unavailable:
              type: boolean
              description: |
                true 表示當日該分店已無任何時段能滿足指定人數（床位與技師雙重條件皆不足），
                前端應跳回 Step 1；false 表示僅所選時段不可用，停留 Step 2 即可。
              example: false
    BookingCreateRequest:
      type: object
      required:
      - branch_id
      - booking_date
      - slot_start
      - slot_end
      - booker_name
      - booker_phone
      - booker_email
      - guests
      properties:
        branch_id:
          type: integer
          example: 1
        booking_date:
          type: string
          format: date
          example: '2026-05-01'
          description: 不得早於今日
        slot_start:
          type: string
          example: '13:00'
        slot_end:
          type: string
          example: '14:30'
        booker_name:
          type: string
          example: 陳小明
        booker_phone:
          type: string
          pattern: ^09\d{8}$
          example: 0912345678
        booker_email:
          type: string
          format: email
          example: chen@example.com
        guests:
          type: array
          minItems: 1
          maxItems: 4
          items:
            $ref: '#/components/schemas/GuestInput'
    BookingCreateResponse:
      type: object
      properties:
        booking_code:
          type: string
          example: BK-260501-0042
        status:
          type: string
          enum:
          - PENDING
          example: PENDING
        branch_name:
          type: string
          example: 台北信義店
        booking_date:
          type: string
          format: date
          example: '2026-05-01'
        slot_start:
          type: string
          example: '13:00'
        slot_end:
          type: string
          example: '14:30'
        total_guests:
          type: integer
          example: 2
        guests:
          type: array
          items:
            $ref: '#/components/schemas/GuestSummary'
        total_price:
          type: string
          example: '1850.00'
    BookingVerifyRequest:
      type: object
      required:
      - booking_code
      - booker_phone
      - booker_email
      properties:
        booking_code:
          type: string
          pattern: '^BK-\d{6}-\d{4}$'
          example: BK-260501-0042
          description: |
            完整預約編號，格式為 BK-YYMMDD-XXXX。
            前台取消頁面將預約編號拆為「中段日期碼」與「後段 4 位亂數」兩個輸入框，
            前端應在送出前自行組合為完整字串（如 BK-260501-0042）再傳入此欄位。
        booker_phone:
          type: string
          example: 0912345678
        booker_email:
          type: string
          format: email
          example: chen@example.com
    BookingVerifyResponse:
      type: object
      properties:
        booking_code:
          type: string
          example: BK-260501-0042
        status:
          type: string
          enum:
          - PENDING
          - CONFIRMED
          example: CONFIRMED
        booker_name:
          type: string
          example: 陳小明
        branch_name:
          type: string
          example: 台北信義店
        booking_date:
          type: string
          format: date
          example: '2026-05-01'
        slot_start:
          type: string
          example: '13:00'
        slot_end:
          type: string
          example: '14:30'
        total_guests:
          type: integer
          example: 2
        guests:
          type: array
          items:
            $ref: '#/components/schemas/GuestSummary'
        total_price:
          type: string
          example: '1850.00'
        cancel_deadline:
          type: string
          format: date-time
          example: '2026-04-30T13:00:00+08:00'
          description: 可取消的最晚時間（預約時段開始前 24 小時）
    BookingStatus:
      type: string
      enum:
      - PENDING
      - CONFIRMED
      - CANCELLED
      description: '- PENDING：待確認（初始狀態）

        - CONFIRMED：已確認（店家收款確認後更新）

        - CANCELLED：已取消（終態，不可再變更）

        '
    BookingListItem:
      type: object
      properties:
        id:
          type: integer
          example: 5
        booking_code:
          type: string
          example: BK-260415-0005
        branch_name:
          type: string
          example: 台北信義店
        booking_date:
          type: string
          format: date
          example: '2026-04-15'
        slot_start:
          type: string
          example: '14:30'
        slot_end:
          type: string
          example: '16:00'
        total_guests:
          type: integer
          example: 2
        booker_name:
          type: string
          example: 陳小明
        status:
          $ref: '#/components/schemas/BookingStatus'
        created_at:
          type: string
          format: date-time
          example: '2026-04-10T11:32:00+08:00'
    BookingDetail:
      type: object
      properties:
        id:
          type: integer
          example: 5
        booking_code:
          type: string
          example: BK-260415-0005
        status:
          $ref: '#/components/schemas/BookingStatus'
        branch_name:
          type: string
          example: 台北信義店
        booking_date:
          type: string
          format: date
          example: '2026-04-15'
        slot_start:
          type: string
          example: '14:30'
        slot_end:
          type: string
          example: '16:00'
        total_guests:
          type: integer
          example: 2
        booker_name:
          type: string
          example: 陳小明
        booker_phone:
          type: string
          example: 0912345678
        booker_email:
          type: string
          example: chen@example.com
        admin_note:
          type: string
          nullable: true
          example: 客人要求輕力道
        created_at:
          type: string
          format: date-time
          example: '2026-04-10T11:32:00+08:00'
        guests:
          type: array
          items:
            $ref: '#/components/schemas/AdminGuestDetail'
        total_price:
          type: string
          example: '2000.00'
    AdminGuestDetail:
      type: object
      properties:
        guest_order:
          type: integer
          example: 1
        is_primary:
          type: boolean
          example: true
        service_name:
          type: string
          example: 全身指壓按摩
        duration_min:
          type: integer
          example: 60
        price:
          type: string
          example: '1200.00'
        bed_number:
          type: string
          example: A-01
        therapist_name:
          type: string
          example: 王技師
        status:
          type: string
          enum:
          - CONFIRMED
          - CANCELLED
          example: CONFIRMED
    DashboardBedCell:
      type: object
      properties:
        bed_number:
          type: string
          example: A-01
        booking_code:
          type: string
          nullable: true
          example: BK-260415-0001
          description: null 表示空床位
        booker_name:
          type: string
          nullable: true
          example: 林小華
        guest_order:
          type: integer
          nullable: true
          example: 1
          description: 成員順序，配合 total_guests 顯示「林小華1」或僅「林小華」
        total_guests:
          type: integer
          nullable: true
          example: 2
        service_name:
          type: string
          nullable: true
          example: 全身指壓
        therapist_name:
          type: string
          nullable: true
          example: 王技師
    DashboardSlot:
      type: object
      properties:
        slot_start:
          type: string
          example: '10:00'
        slot_end:
          type: string
          example: '11:30'
        beds:
          type: array
          items:
            $ref: '#/components/schemas/DashboardBedCell'
    DashboardBranch:
      type: object
      properties:
        branch_id:
          type: integer
          example: 1
        branch_name:
          type: string
          example: 台北信義店
        occupied:
          type: integer
          example: 7
          description: 當日已佔用床位總格數
        total_capacity:
          type: integer
          example: 30
          description: 當日總床位格數（床位數 × 時段數）
        slots:
          type: array
          items:
            $ref: '#/components/schemas/DashboardSlot'
  responses:
    Unauthorized:
      description: 未認證
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: 請先登入
    Forbidden:
      description: 權限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: FORBIDDEN
              message: 您的角色無此操作權限
    BookingNotFound:
      description: 預約不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: BOOKING_NOT_FOUND
              message: 查無此預約，請確認預約編號
    TransactionFailed:
      description: 資料庫交易失敗，已 Rollback
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: TRANSACTION_FAILED
              message: 系統暫時無法處理，請稍後再試
paths:
  /public/branches:
    get:
      tags:
      - 前台 - 分店與服務
      summary: 查詢分店列表
      description: 回傳所有 is_active = true 的分店，供 Step 1 分店下拉選單使用。
      operationId: getPublicBranches
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Branch'
              example:
                success: true
                data:
                - id: 1
                  name: 台北信義店
                  phone: 02-1234-5678
                - id: 2
                  name: 台北中山店
                  phone: 02-2345-6789
                - id: 3
                  name: 新北板橋店
                  phone: 02-3456-7890
  /public/services:
    get:
      tags:
      - 前台 - 分店與服務
      summary: 查詢服務項目列表
      description: 回傳所有 is_active = true 的服務項目，供 Step 2 成員服務選單使用。
      operationId: getPublicServices
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Service'
              example:
                success: true
                data:
                - id: 1
                  name: 全身指壓按摩
                  duration_min: 60
                  price: '1200.00'
                - id: 2
                  name: 腳底反射療法
                  duration_min: 40
                  price: '800.00'
                - id: 3
                  name: 肩頸舒緩護理
                  duration_min: 30
                  price: '650.00'
                - id: 4
                  name: 精油芳療全身
                  duration_min: 90
                  price: '1800.00'
  /public/slots:
    get:
      tags:
      - 前台 - 時段查詢
      summary: 查詢可預約時段
      description: 'Step 1 送出後，依分店、日期、人數計算可預約時段。


        **篩選邏輯（雙重條件，兩者皆須滿足）：**

        1. 該分店該日各時段空閒床位數 ≥ guests

        2. 該分店該日各時段中，`therapist_schedules.status = AVAILABLE` 且時間範圍與時段完全吻合的技師班次數 ≥
        guests


        兩個條件任一不滿足的時段不回傳。回傳空陣列表示當日無可用時段。


        **前端空陣列處理（對應 SRS 3.1.2）：**

        `slots` 為空陣列時，前端應顯示提示訊息：「很抱歉！該分店該日期無符合人數的可預約時段，請重新選擇分店、日期或人數！」，
        關閉提示後停留在 Step 1 且三個選項恢復預設狀態（分店清空、日期今日、人數 1）。

        '
      operationId: getPublicSlots
      parameters:
      - name: branch_id
        in: query
        required: true
        schema:
          type: integer
        example: 1
      - name: date
        in: query
        required: true
        schema:
          type: string
          format: date
        example: '2026-05-01'
      - name: guests
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          maximum: 4
        example: 2
      responses:
        '200':
          description: 成功（slots 為空陣列表示無可用時段）
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      slots:
                        type: array
                        items:
                          $ref: '#/components/schemas/Slot'
              examples:
                有可用時段:
                  value:
                    success: true
                    data:
                      slots:
                      - slot_start: '10:00'
                        slot_end: '11:30'
                      - slot_start: '13:00'
                        slot_end: '14:30'
                無可用時段:
                  value:
                    success: true
                    data:
                      slots: []
        '400':
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: 缺少必要參數 branch_id
  /public/bookings:
    post:
      tags:
      - 前台 - 預約
      summary: 建立預約
      description: 'Step 3 確認送出後執行。


        **系統處理流程（資料庫交易）：**

        1. 二次確認時段床位仍足夠（防搶訂）

        2. 二次確認 AVAILABLE 技師班次數仍足夠

        3. 依序為每位成員分配床位與技師班次

        4. 寫入 bookings（status: PENDING）

        5. 寫入 booking_guests

        6. 更新 therapist_schedules.status → BOOKED

        7. 非同步發送預約確認 Email


        任一步驟失敗執行完整 Rollback。

        '
      operationId: createPublicBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          description: 預約建立成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/BookingCreateResponse'
              example:
                success: true
                data:
                  booking_code: BK-260501-0042
                  status: PENDING
                  branch_name: 台北信義店
                  booking_date: '2026-05-01'
                  slot_start: '13:00'
                  slot_end: '14:30'
                  total_guests: 2
                  guests:
                  - guest_order: 1
                    is_primary: true
                    service_name: 全身指壓按摩
                    duration_min: 60
                    price: '1200.00'
                  - guest_order: 2
                    is_primary: false
                    service_name: 肩頸舒緩護理
                    duration_min: 30
                    price: '650.00'
                  total_price: '1850.00'
        '400':
          description: 欄位驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: 手機號碼格式不正確
        '409':
          description: |
            資源衝突（時段床位被搶訂或技師班次不足）。
            回應中的 `all_slots_unavailable` 欄位指示前端導頁行為：
            - `false` → 停留 Step 2，清除時段選擇讓客人重選。
            - `true` → 跳回 Step 1，清除所有選擇並顯示「無可用時段」提示。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotUnavailableError'
              examples:
                床位被搶訂_仍有其他時段:
                  summary: 所選時段床位不足，但當日仍有其他可用時段（停留 Step 2）
                  value:
                    success: false
                    error:
                      code: SLOT_UNAVAILABLE
                      message: 所選時段床位已不足，請重新選擇時段
                      all_slots_unavailable: false
                技師班次不足_仍有其他時段:
                  summary: 所選時段技師不足，但當日仍有其他可用時段（停留 Step 2）
                  value:
                    success: false
                    error:
                      code: THERAPIST_UNAVAILABLE
                      message: 所選時段技師班次不足，請重新選擇時段
                      all_slots_unavailable: false
                所有時段均不可用:
                  summary: 當日所有時段皆無法滿足人數（跳回 Step 1）
                  value:
                    success: false
                    error:
                      code: SLOT_UNAVAILABLE
