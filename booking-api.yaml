      - 後台 - 手動建立預約
      summary: 查詢可用時段（後台）
      description: '後台手動建立預約 Step 1 送出後查詢，邏輯與篩選條件與前台 `GET /public/slots` 完全一致。


        **存取角色：** 僅限營運人員（Operations Staff）；門市人員呼叫此端點將回傳 403。


        獨立端點設計，預留未來擴充（如回傳剩餘床位數等管理資訊）而不影響前台端點。


        **篩選邏輯（同前台）：**

        1. 空閒床位數 ≥ guests

        2. 該分店該時段 AVAILABLE 技師班次數 ≥ guests，且時間範圍完全吻合

        '
      operationId: getAdminSlots
      security:
      - BearerAuth: []
      parameters:
      - name: branch_id
        in: query
        required: true
        schema:
          type: integer
        example: 1
      - name: date
        in: query
        required: true
        schema:
          type: string
          format: date
        example: '2026-05-01'
      - name: guests
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          maximum: 4
        example: 2
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      slots:
                        type: array
                        items:
                          $ref: '#/components/schemas/Slot'
              example:
                success: true
                data:
                  slots:
                  - slot_start: '10:00'
                    slot_end: '11:30'
                  - slot_start: '13:00'
                    slot_end: '14:30'
                  - slot_start: '14:30'
                    slot_end: '16:00'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/dashboard:
    get:
      tags:
      - 後台 - 看板
      summary: 查詢預約營運看板
      description: '預約營運看板頁使用，門市人員與營運人員皆可存取。


        **存取角色：** 門市人員（Store Staff）與營運人員（Operations Staff）均可呼叫此端點；兩者皆不回傳 403。


        依日期與分店回傳各時段每個床位的佔用資料。


        - `booking_code = null` 表示空床位

        - `guest_order` 與 `total_guests` 配合使用：`total_guests > 1` 時前端顯示「林小華1」，`total_guests
        = 1` 時只顯示「林小華」

        - `occupied` 為當日已佔用的床位格總數，`total_capacity` 為床位數 × 時段數

        '
      operationId: getAdminDashboard
      security:
      - BearerAuth: []
      parameters:
      - name: date
        in: query
        required: true
        schema:
          type: string
          format: date
        example: '2026-04-15'
        description: 預設由前端帶入今日日期
      - name: branch_id
