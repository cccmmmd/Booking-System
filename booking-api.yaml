        **存取角色：** 僅限營運人員（Operations Staff）；門市人員呼叫此端點將回傳 403。


        **前端預設行為：** 頁面載入時前端主動帶入當日日期（`date=今天`）與登入者所屬分店（`branch_id`），API 本身不設後端預設篩選值。


