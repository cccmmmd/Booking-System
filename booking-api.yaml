  /admin/bookings/{booking_code}/status:
    patch:
      tags:
      - 後台 - 預約管理
      summary: 更新預約狀態
      description: '列表頁 Popover 狀態 Pill 點擊即生效（1 click，無需二次確認）。


        **存取角色：** 僅限營運人員（Operations Staff）；門市人員呼叫此端點將回傳 403。


        **合法狀態值：** `PENDING`、`CONFIRMED`


        `CANCELLED` 不透過此端點，需使用 `POST /admin/bookings/{booking_code}/cancel`。


        **狀態流轉規則：**

        - PENDING → CONFIRMED ✓

        - CONFIRMED → PENDING ✓

        - CANCELLED → 任何狀態 ✗（回傳 422）

        '
      operationId: updateAdminBookingStatus
      security:
      - BearerAuth: []
      parameters:
      - name: booking_code
        in: path
        required: true
        schema:
          type: string
        example: BK-260415-0005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  enum:
                  - PENDING
                  - CONFIRMED
                  example: CONFIRMED
      responses:
        '200':
          description: 狀態更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      booking_code:
                        type: string
                        example: BK-260415-0005
                      status:
                        $ref: '#/components/schemas/BookingStatus'
              example:
                success: true
                data:
                  booking_code: BK-260415-0005
                  status: CONFIRMED
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/BookingNotFound'
        '422':
          description: 非法狀態流轉
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: INVALID_STATUS_TRANSITION
                  message: 已取消的預約無法變更狀態
