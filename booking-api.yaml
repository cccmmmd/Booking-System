                        - CANCELLED
                        example: CANCELLED
              example:
                success: true
                data:
                  booking_code: BK-260501-0042
                  status: CANCELLED
        '400':
          description: |
            查無預約或身份驗證失敗。
            依照 SRS 3.1.6，「預約編號不存在」與「手機/Email 不符」對前台客人屬同一錯誤情境，
            統一以此狀態碼回傳，前端顯示相同的提示：「沒查到該筆預約資訊，請確認輸入的資訊是否正確！」
            並重置所有欄位停留在本頁。
            涵蓋情境：(1) 預約編號不存在；(2) 預約編號存在但手機或 Email 不符。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: BOOKING_LOOKUP_FAILED
                  message: 沒查到該筆預約資訊，請確認輸入的資訊是否正確！
        '409':
          description: 預約已取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: BOOKING_ALREADY_CANCELLED
                  message: 此預約已取消
        '422':
          description: 超過取消期限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: CANCEL_DEADLINE_EXCEEDED
                  message: 此預約已超過取消期限，請來電分店
        '500':
          $ref: '#/components/responses/TransactionFailed'
  /admin/bookings:
