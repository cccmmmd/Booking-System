                      all_slots_unavailable: true
        '500':
          $ref: '#/components/responses/TransactionFailed'
  /public/bookings/verify:
    post:
      tags:
      - 前台 - 取消預約
      summary: 取消前驗證預約身份
      description: '客人輸入預約編號、手機、Email 後送出，驗證身份並回傳預約摘要。


        **驗證通過條件：**

        - 預約編號存在

        - 手機號碼與預約紀錄吻合

        - Email 與預約紀錄吻合

        - 預約狀態為 PENDING 或 CONFIRMED

        - 當前時間在預約時段開始前 24 小時以上

        '
      operationId: verifyPublicBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingVerifyRequest'
      responses:
        '200':
          description: 驗證通過，回傳預約摘要
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/BookingVerifyResponse'
              example:
                success: true
                data:
                  booking_code: BK-260501-0042
                  status: CONFIRMED
                  booker_name: 陳小明
                  branch_name: 台北信義店
                  booking_date: '2026-05-01'
                  slot_start: '13:00'
                  slot_end: '14:30'
                  total_guests: 2
                  guests:
                  - guest_order: 1
                    is_primary: true
                    service_name: 全身指壓按摩
                    duration_min: 60
                    price: '1200.00'
                  - guest_order: 2
                    is_primary: false
                    service_name: 肩頸舒緩護理
                    duration_min: 30
                    price: '650.00'
                  total_price: '1850.00'
                  cancel_deadline: '2026-04-30T13:00:00+08:00'
        '400':
          description: |
            查無預約或身份驗證失敗。
            依照 SRS 3.1.6，「預約編號不存在」與「手機/Email 不符」對前台客人屬同一錯誤情境，
            統一以此狀態碼回傳，前端顯示相同的提示：「沒查到該筆預約資訊，請確認輸入的資訊是否正確！」
            並重置所有欄位停留在本頁。
            涵蓋情境：(1) 預約編號不存在；(2) 預約編號存在但手機或 Email 不符。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: BOOKING_LOOKUP_FAILED
                  message: 沒查到該筆預約資訊，請確認輸入的資訊是否正確！
        '409':
          description: 預約已取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: BOOKING_ALREADY_CANCELLED
                  message: 此預約已取消
        '422':
          description: 超過 24 小時取消期限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: CANCEL_DEADLINE_EXCEEDED
                  message: 此預約已超過取消期限，請來電分店
  /public/bookings/cancel:
    post:
      tags:
      - 前台 - 取消預約
      summary: 執行取消預約（前台）
      description: '確認取消資訊頁點擊「確認取消」後呼叫。


        後端需再次執行完整驗證（三要素 + 期限檢查），防止跳過 verify 直接呼叫。


        成功後**觸發 Email 模組**，發送取消確認通知至主要預約人信箱，前台顯示「預約已取消」兩秒後導回首頁。


        > **Email 行為對照：** 前台取消 → 發送取消確認 Email；後台人工取消（`POST /admin/bookings/{booking_code}/cancel`）→ 不觸發 Email 模組。

        '
